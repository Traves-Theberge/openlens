name: OpenLens PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  review:
    name: Code Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Provider credentials: set any OpenCode-supported provider key as a secret.
      # See https://github.com/anomalyco/opencode for the full provider list.
      # Alternatively, commit a .opencode.json config to your repo.
      - uses: ./
        with:
          mode: branch
          base-branch: ${{ github.base_ref }}
          comment-on-pr: "true"
          upload-sarif: "true"
          fail-on-critical: "true"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional — use any supported provider
