name: "OpenLens"
description: "AI-powered code review using specialized agents"
branding:
  icon: "eye"
  color: "blue"

inputs:
  mode:
    description: "Review mode: staged, unstaged, branch, auto"
    required: false
    default: "branch"
  agents:
    description: "Comma-separated agent names (default: all)"
    required: false
  format:
    description: "Output format: text, json, sarif, markdown"
    required: false
    default: "sarif"
  base-branch:
    description: "Base branch for branch mode diff"
    required: false
    default: "main"
  verify:
    description: "Run verification pass"
    required: false
    default: "true"
  config:
    description: "Path to openlens.json config file"
    required: false
  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning"
    required: false
    default: "true"
  fail-on-critical:
    description: "Fail the workflow if critical issues are found"
    required: false
    default: "true"
  model:
    description: "Override model (default: opencode/big-pickle). Use any OpenCode-supported model."
    required: false
  anthropic-api-key:
    description: "Anthropic API key — only needed when using Anthropic models"
    required: false
  openai-api-key:
    description: "OpenAI API key — only needed when using OpenAI models"
    required: false
  comment-on-pr:
    description: "Post review results as a PR comment (pull_request events only)"
    required: false
    default: "false"
  inline-comments:
    description: "Post inline review comments on specific lines (requires comment-on-pr)"
    required: false
    default: "true"

outputs:
  issues:
    description: "Number of issues found"
    value: ${{ steps.review.outputs.issues }}
  critical:
    description: "Number of critical issues found"
    value: ${{ steps.review.outputs.critical }}
  sarif-file:
    description: "Path to SARIF output file"
    value: ${{ steps.review.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install OpenLens
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --frozen-lockfile

    - name: Verify OpenCode binary
      shell: bash
      run: |
        OPENCODE_BIN="${{ github.action_path }}/node_modules/.bin/opencode"
        if [ ! -f "$OPENCODE_BIN" ]; then
          echo "::error::OpenCode binary not found. Installation may have failed."
          exit 1
        fi
        echo "OpenCode version: $($OPENCODE_BIN --version)"

    - name: Run OpenLens
      id: review
      shell: bash
      env:
        # CI detection
        CI: "true"
        # API keys — only needed when using paid provider models
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key || env.ANTHROPIC_API_KEY || '' }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key || env.OPENAI_API_KEY || '' }}
        # OpenLens config overrides
        OPENLENS_MODE: ${{ inputs.mode }}
        OPENLENS_AGENTS: ${{ inputs.agents }}
        OPENLENS_FORMAT: ${{ inputs.format }}
        OPENLENS_BASE_BRANCH: ${{ inputs.base-branch }}
        OPENLENS_VERIFY: ${{ inputs.verify }}
        OPENLENS_CONFIG: ${{ inputs.config }}
        OPENLENS_MODEL: ${{ inputs.model }}
        # Use bundled binary
        OPENCODE_BIN: ${{ github.action_path }}/node_modules/.bin/opencode
      run: |
        FLAGS="--${OPENLENS_MODE:-branch}"
        FLAGS="$FLAGS --format ${OPENLENS_FORMAT:-sarif}"

        if [ -n "$OPENLENS_AGENTS" ]; then
          FLAGS="$FLAGS --agents $OPENLENS_AGENTS"
        fi

        if [ -n "$OPENLENS_BASE_BRANCH" ]; then
          FLAGS="$FLAGS --branch $OPENLENS_BASE_BRANCH"
        fi

        if [ "$OPENLENS_VERIFY" = "false" ]; then
          FLAGS="$FLAGS --no-verify"
        fi

        SARIF_FILE="${{ runner.temp }}/openlens-results.sarif"

        # Run review
        set +e
        bun run ${{ github.action_path }}/src/index.ts run $FLAGS > "$SARIF_FILE" 2>&1
        EXIT_CODE=$?
        set -e

        # Parse issue counts from SARIF
        if [ -f "$SARIF_FILE" ] && command -v jq &> /dev/null; then
          TOTAL=$(jq '.runs[0].results | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          CRITICAL=$(jq '[.runs[0].results[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        else
          TOTAL="0"
          CRITICAL="0"
        fi

        echo "issues=$TOTAL" >> "$GITHUB_OUTPUT"
        echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$SARIF_FILE" >> "$GITHUB_OUTPUT"

        # Show summary
        if [ "$OPENLENS_FORMAT" = "sarif" ]; then
          echo "### OpenLens Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issues found:** $TOTAL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Critical:** $CRITICAL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode:** $OPENLENS_MODE" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Fail if critical issues and configured to do so
        if [ "${{ inputs.fail-on-critical }}" = "true" ] && [ "$EXIT_CODE" = "1" ]; then
          echo "::error::OpenLens found $CRITICAL critical issue(s)"
          exit 1
        fi

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.review.outputs.sarif-file }}
        category: openlens
      continue-on-error: true

    - name: Generate JSON review output
      id: json-review
      if: inputs.comment-on-pr == 'true' && inputs.inline-comments == 'true' && github.event_name == 'pull_request' && always()
      shell: bash
      env:
        CI: "true"
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key || env.ANTHROPIC_API_KEY || '' }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key || env.OPENAI_API_KEY || '' }}
        OPENLENS_MODE: ${{ inputs.mode }}
        OPENLENS_AGENTS: ${{ inputs.agents }}
        OPENLENS_BASE_BRANCH: ${{ inputs.base-branch }}
        OPENLENS_VERIFY: ${{ inputs.verify }}
        OPENLENS_CONFIG: ${{ inputs.config }}
        OPENLENS_MODEL: ${{ inputs.model }}
        OPENCODE_BIN: ${{ github.action_path }}/node_modules/.bin/opencode
      run: |
        FLAGS="--${OPENLENS_MODE:-branch}"
        FLAGS="$FLAGS --format json"

        if [ -n "$OPENLENS_AGENTS" ]; then
          FLAGS="$FLAGS --agents $OPENLENS_AGENTS"
        fi

        if [ -n "$OPENLENS_BASE_BRANCH" ]; then
          FLAGS="$FLAGS --branch $OPENLENS_BASE_BRANCH"
        fi

        if [ "$OPENLENS_VERIFY" = "false" ]; then
          FLAGS="$FLAGS --no-verify"
        fi

        JSON_FILE="${{ runner.temp }}/openlens-review.json"

        set +e
        bun run ${{ github.action_path }}/src/index.ts run $FLAGS > "$JSON_FILE" 2>/dev/null
        set -e

        echo "json-file=$JSON_FILE" >> "$GITHUB_OUTPUT"
      continue-on-error: true

    - name: Post PR Review
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const crypto = require('crypto');

          const useInline = '${{ inputs.inline-comments }}' === 'true';
          const jsonPath = '${{ steps.json-review.outputs.json-file }}';
          const sarifPath = '${{ steps.review.outputs.sarif-file }}';
          const prNumber = context.payload.pull_request?.number || context.issue.number;

          // --- Read JSON review output ---
          let reviewData = null;
          if (useInline && jsonPath) {
            try {
              reviewData = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'));
            } catch {
              // JSON output not available — fall back to SARIF summary
            }
          }

          // --- Inline review via PR Review API ---
          if (reviewData && reviewData.issues) {
            const issues = reviewData.issues;
            const hasCritical = issues.some(i => i.severity === 'critical');
            const hasIssues = issues.length > 0;

            // Compute fingerprints
            function fingerprint(issue) {
              return crypto.createHash('sha256')
                .update(`${issue.file}\x00${issue.title}\x00${issue.agent}`)
                .digest('hex')
                .slice(0, 16);
            }

            const fingerprints = {};
            for (const issue of issues) {
              fingerprints[fingerprint(issue)] = {
                file: issue.file,
                title: issue.title,
                agent: issue.agent,
                line: issue.line,
              };
            }

            // Build review comments
            const comments = issues.map(issue => {
              const parts = [
                `**${issue.severity.toUpperCase()}** — ${issue.title}`,
                '',
                issue.message,
              ];
              if (issue.fix) parts.push('', `**Fix:** ${issue.fix}`);
              if (issue.patch) parts.push('', '```diff', issue.patch, '```');
              parts.push('', `_Agent: ${issue.agent}_`);

              const comment = {
                path: issue.file,
                line: issue.endLine || issue.line,
                body: parts.join('\n'),
              };
              if (issue.endLine && issue.endLine !== issue.line) {
                comment.start_line = issue.line;
              }
              return comment;
            });

            // Determine review event
            const event = hasCritical ? 'REQUEST_CHANGES' : hasIssues ? 'COMMENT' : 'APPROVE';

            const summary = hasIssues
              ? `OpenLens found **${issues.length} issue(s)** across ${reviewData.meta?.filesChanged || '?'} files.`
              : 'OpenLens found no issues.';

            // Submit review
            try {
              // Dismiss previous OpenLens reviews to avoid stale REQUEST_CHANGES blocks
              const { data: existingReviews } = await github.rest.pulls.listReviews({
                ...context.repo,
                pull_number: prNumber,
              });

              for (const rev of existingReviews) {
                if (rev.body?.includes('OpenLens found') && rev.state === 'CHANGES_REQUESTED') {
                  try {
                    await github.rest.pulls.dismissReview({
                      ...context.repo,
                      pull_number: prNumber,
                      review_id: rev.id,
                      message: 'Superseded by new OpenLens review.',
                    });
                  } catch {
                    // May not have permission to dismiss — continue
                  }
                }
              }

              await github.rest.pulls.createReview({
                ...context.repo,
                pull_number: prNumber,
                commit_id: context.payload.pull_request.head.sha,
                event,
                body: summary,
                comments: comments.slice(0, 50), // GitHub limits to ~50 comments per review
              });
            } catch (err) {
              core.warning(`Failed to submit inline review: ${err.message}`);
            }

            // --- Save fingerprint state as a comment ---
            const stateMarker = '<!-- openlens-review-state: ';
            const statePayload = Buffer.from(JSON.stringify(fingerprints)).toString('base64');
            const stateBody = `${stateMarker}${statePayload} -->\n_OpenLens review fingerprints — do not edit._`;

            const { data: allComments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            const existingState = allComments.find(c => c.body?.includes(stateMarker));

            if (existingState) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existingState.id,
                body: stateBody,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: stateBody,
              });
            }

            return; // Done — inline review posted
          }

          // --- Fallback: summary comment from SARIF (when inline-comments is off or JSON unavailable) ---
          let results = [];
          try {
            const sarif = JSON.parse(fs.readFileSync(sarifPath, 'utf-8'));
            results = sarif.runs?.[0]?.results || [];
          } catch {
            // SARIF file missing or invalid — post a fallback comment
          }

          const issueCount = results.length;
          const criticalCount = results.filter(r => r.level === 'error').length;
          const warningCount = results.filter(r => r.level === 'warning').length;
          const infoCount = results.filter(r => r.level === 'note').length;

          const marker = '<!-- openlens-review -->';
          let body = marker + '\n';
          body += '## :mag: OpenLens Review\n\n';

          if (issueCount === 0) {
            body += ':white_check_mark: **No issues found.**\n';
          } else {
            body += `**${issueCount} issue${issueCount === 1 ? '' : 's'}** found`;
            if (criticalCount > 0) body += ` (:red_circle: ${criticalCount} critical)`;
            body += '\n\n';

            body += '| Severity | Count |\n|----------|-------|\n';
            if (criticalCount > 0) body += `| :red_circle: Critical | ${criticalCount} |\n`;
            if (warningCount > 0) body += `| :yellow_circle: Warning | ${warningCount} |\n`;
            if (infoCount > 0) body += `| :blue_circle: Info | ${infoCount} |\n`;
            body += '\n---\n\n';

            const byFile = {};
            for (const r of results) {
              const file = r.locations?.[0]?.physicalLocation?.artifactLocation?.uri || 'unknown';
              if (!byFile[file]) byFile[file] = [];
              byFile[file].push(r);
            }

            const sha = context.sha;
            const repo = `${context.repo.owner}/${context.repo.repo}`;

            for (const [file, issues] of Object.entries(byFile)) {
              body += `<details>\n<summary><b>${file}</b> (${issues.length} issue${issues.length === 1 ? '' : 's'})</summary>\n\n`;
              for (const issue of issues) {
                const line = issue.locations?.[0]?.physicalLocation?.region?.startLine || 1;
                const endLine = issue.locations?.[0]?.physicalLocation?.region?.endLine;
                const range = endLine ? `L${line}-L${endLine}` : `L${line}`;
                const link = `https://github.com/${repo}/blob/${sha}/${file}#${range}`;
                const emoji = issue.level === 'error' ? ':red_circle:' : issue.level === 'warning' ? ':yellow_circle:' : ':blue_circle:';
                const ruleId = issue.ruleId || '';
                const msgLines = (issue.message?.text || '').split('\n').filter(l => l.trim());

                body += `${emoji} **${msgLines[0] || 'Issue'}**\n`;
                body += `[${file}:${line}](${link}) | \`${ruleId}\`\n\n`;

                if (msgLines.length > 1) {
                  body += msgLines.slice(1).join('\n') + '\n\n';
                }

                if (issue.fixes?.[0]) {
                  const patch = issue.fixes[0].artifactChanges?.[0]?.replacements?.[0]?.insertedContent?.text;
                  if (patch) {
                    body += '```diff\n' + patch + '\n```\n\n';
                  }
                }
              }
              body += '</details>\n\n';
            }
          }

          if (body.length > 60000) {
            body = body.slice(0, 59800) + '\n\n---\n\n> :warning: Output truncated. Run `openlens run` locally for full results.\n';
          }

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: prNumber,
          });

          const existing = comments.find(c => c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body,
            });
          }
      continue-on-error: true
